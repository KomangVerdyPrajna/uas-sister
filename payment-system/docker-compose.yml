services:
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order

  order:
    build: .
    command: python order_service.py
    deploy:
      replicas: 2
    environment:
      RABBIT_HOST: rabbitmq
      REQ_QUEUE: booking_requests
    volumes:
      - db_data:/app/db
    depends_on:
      - rabbitmq

  worker:
    build: .
    command: python worker.py
    environment:
      RABBIT_HOST: rabbitmq
      REQ_QUEUE: booking_requests
      ALL_NODES: "node-1:1,node-2:2,node-3:3"
    depends_on:
      - rabbitmq
      - node-1
      - node-2
      - node-3

  node-1:
    build: .
    command: python cluster_node.py
    environment:
      NODE_NAME: "node-1"
      NODE_ID: "1"
      ALL_NODES: "node-1:1,node-2:2,node-3:3"
    ports:
      - "9001:9000"

  node-2:
    build: .
    command: python cluster_node.py
    environment:
      NODE_NAME: "node-2"
      NODE_ID: "2"
      ALL_NODES: "node-1:1,node-2:2,node-3:3"
    ports:
      - "9002:9000"

  node-3:
    build: .
    command: python cluster_node.py
    environment:
      NODE_NAME: "node-3"
      NODE_ID: "3"
      ALL_NODES: "node-1:1,node-2:2,node-3:3"
    ports:
      - "9003:9000"

volumes:
  db_data: